<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>踩地雷</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a12;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Courier New', monospace;
      overflow: hidden;
    }
    #game { display: block; cursor: crosshair; image-rendering: pixelated; }
  </style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// === GAME CONFIG ===
let COLS = 16, ROWS = 16, MINES = 40;
const CELL = 32;
const PANEL_H = 64;

// === COLORS ===
const BG = '#0a0a12';
const CELL_HIDDEN = [20, 20, 35];
const CELL_REVEALED = [10, 10, 18];
const CELL_HOVER = [30, 30, 50];
const NUM_COLORS = ['', '#4fc3f7', '#81c784', '#ff7043', '#ba68c8', '#f06292', '#4dd0e1', '#eceff1', '#78909c'];
const MINE_COLOR = '#ff3d3d';
const FLAG_COLOR = '#ff7043';

// === STATE ===
let board = [];
let revealed = [];
let flagged = [];
let gameState = 'idle';
let firstClick = false;
let timer = 0;
let minesLeft = MINES;
let hoverCell = [null, null];
let particles = [];
let ripples = [];
let bestTime = 0;

try { bestTime = parseInt(localStorage.getItem('minesweeper_best') || '0'); } catch(e) {}

const W = COLS * CELL;
const H = ROWS * CELL;
canvas.width = W;
canvas.height = H + PANEL_H;

function initGame() {
  board = [];
  revealed = [];
  flagged = [];
  for (let r = 0; r < ROWS; r++) {
    board[r] = [];
    revealed[r] = [];
    flagged[r] = [];
    for (let c = 0; c < COLS; c++) {
      board[r][c] = 0;
      revealed[r][c] = false;
      flagged[r][c] = false;
    }
  }
  gameState = 'idle';
  firstClick = false;
  timer = 0;
  minesLeft = MINES;
  hoverCell = [null, null];
  particles = [];
  ripples = [];
}

function placeMines(sx, sy) {
  let placed = 0;
  while (placed < MINES) {
    const r = Math.floor(Math.random() * ROWS);
    const c = Math.floor(Math.random() * COLS);
    if (Math.abs(r - sy) <= 1 && Math.abs(c - sx) <= 1) continue;
    if (board[r][c] === -1) continue;
    board[r][c] = -1;
    placed++;
  }
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (board[r][c] === -1) continue;
      let count = 0;
      for (let dr = -1; dr <= 1; dr++) {
        for (let dc = -1; dc <= 1; dc++) {
          const nr = r + dr, nc = c + dc;
          if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && board[nr][nc] === -1) count++;
        }
      }
      board[r][c] = count;
    }
  }
}

function revealCell(r, c) {
  if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return;
  if (revealed[r][c] || flagged[r][c]) return;
  if (gameState !== 'playing') return;

  revealed[r][c] = true;
  ripples.push({ r, c, life: 1 });

  if (board[r][c] === -1) {
    gameState = 'lost';
    spawnExplosion(r, c);
    return;
  }

  if (board[r][c] === 0) {
    setTimeout(() => {
      for (let dr = -1; dr <= 1; dr++) {
        for (let dc = -1; dc <= 1; dc++) {
          const nr = r + dr, nc = c + dc;
          if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) {
            if (!revealed[nr][nc] && !flagged[nr][nc]) {
              revealed[nr][nc] = true;
              ripples.push({ r: nr, c: nc, life: 1 });
              if (board[nr][nc] === 0) revealCell(nr, nc);
            }
          }
        }
      }
    }, 30);
  }
}

function spawnExplosion(r, c) {
  const mx = c * CELL + CELL / 2;
  const my = r * CELL + CELL / 2;
  for (let i = 0; i < 20; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 3 + Math.random() * 5;
    particles.push({
      x: mx, y: my,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: 0.025 + Math.random() * 0.02,
      size: 3 + Math.random() * 4,
      color: Math.random() > 0.5 ? '#ff3d3d' : '#ff9800'
    });
  }
  // reveal all mines
  for (let rr = 0; rr < ROWS; rr++) {
    for (let cc = 0; cc < COLS; cc++) {
      if (board[rr][cc] === -1) revealed[rr][cc] = true;
    }
  }
}

function flagCell(r, c) {
  if (revealed[r][c]) return;
  flagged[r][c] = !flagged[r][c];
  minesLeft = MINES - flagged.flat().filter(Boolean).length;
}

function checkWin() {
  let count = 0;
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (revealed[r][c]) count++;
    }
  }
  if (count === ROWS * COLS - MINES) {
    gameState = 'won';
    if (bestTime === 0 || timer < bestTime) {
      bestTime = Math.floor(timer);
      try { localStorage.setItem('minesweeper_best', bestTime); } catch(e) {}
    }
  }
}

// === DRAWING ===
function draw() {
  ctx.fillStyle = BG;
  ctx.fillRect(0, 0, W, H + PANEL_H);

  // Board cells
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      drawCell(r, c);
    }
  }

  // Ripples
  for (let i = ripples.length - 1; i >= 0; i--) {
    const rip = ripples[i];
    rip.life -= 0.06;
    if (rip.life <= 0) { ripples.splice(i, 1); continue; }
    ctx.strokeStyle = `rgba(79, 195, 247, ${rip.life * 0.6})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(rip.c * CELL + CELL / 2, rip.r * CELL + CELL / 2, CELL * 0.4 * (1 - rip.life) + CELL * 0.2, 0, Math.PI * 2);
    ctx.stroke();
  }

  // Grid lines
  ctx.strokeStyle = '#161628';
  ctx.lineWidth = 1;
  for (let c = 0; c <= COLS; c++) {
    ctx.beginPath();
    ctx.moveTo(c * CELL, 0);
    ctx.lineTo(c * CELL, H);
    ctx.stroke();
  }
  for (let r = 0; r <= ROWS; r++) {
    ctx.beginPath();
    ctx.moveTo(0, r * CELL);
    ctx.lineTo(W, r * CELL);
    ctx.stroke();
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.15;
    p.life -= p.decay;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  }
  ctx.globalAlpha = 1;

  // Panel
  drawPanel();

  // Scanlines
  ctx.fillStyle = 'rgba(0,0,0,15)';
  for (let y = 0; y < H + PANEL_H; y += 4) {
    ctx.fillRect(0, y, W, 1);
  }

  // Game over overlay
  if (gameState === 'won') {
    ctx.fillStyle = 'rgba(0,0,0,200)';
    ctx.fillRect(0, H / 2 - 50, W, 100);
    ctx.fillStyle = '#81c784';
    ctx.font = 'bold 28px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('勝利的 ' + Math.floor(timer) + ' 秒', W / 2, H / 2 - 8);
    ctx.fillStyle = '#78909c';
    ctx.font = '12px Courier New';
    ctx.fillText('按 R 重新開始', W / 2, H / 2 + 28);
  } else if (gameState === 'lost') {
    ctx.fillStyle = 'rgba(0,0,0,200)';
    ctx.fillRect(0, H / 2 - 50, W, 100);
    ctx.fillStyle = '#ff7043';
    ctx.font = 'bold 28px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('踩到地雷了！', W / 2, H / 2 - 8);
    ctx.fillStyle = '#78909c';
    ctx.font = '12px Courier New';
    ctx.fillText('按 R 重新開始', W / 2, H / 2 + 28);
  }
}

function drawCell(r, c) {
  const x = c * CELL;
  const y = r * CELL;
  const rev = revealed[r][c];
  const flag = flagged[r][c];
  const val = board[r][c];
  const isHover = hoverCell[0] === r && hoverCell[1] === c;

  if (!rev) {
    ctx.fillStyle = `rgb(${isHover ? CELL_HOVER : CELL_HIDDEN})`;
    ctx.fillRect(x + 1, y + 1, CELL - 2, CELL - 2);
  } else {
    ctx.fillStyle = `rgb(${CELL_REVEALED})`;
    ctx.fillRect(x + 1, y + 1, CELL - 2, CELL - 2);
  }

  if (rev && val > 0) {
    ctx.fillStyle = NUM_COLORS[val];
    ctx.font = `bold ${CELL * 0.55}px Courier New`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(val, x + CELL / 2, y + CELL / 2 + 1);
  }

  if (rev && val === -1) {
    ctx.shadowBlur = 10;
    ctx.shadowColor = MINE_COLOR;
    ctx.fillStyle = MINE_COLOR;
    ctx.beginPath();
    ctx.arc(x + CELL / 2, y + CELL / 2, CELL * 0.28, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.strokeStyle = '#ff8a80';
    ctx.lineWidth = 2;
    const cx = x + CELL / 2, cy = y + CELL / 2, mr = CELL * 0.28;
    for (let i = 0; i < 8; i++) {
      const a = (i / 8) * Math.PI * 2;
      ctx.beginPath();
      ctx.moveTo(cx + Math.cos(a) * mr, cy + Math.sin(a) * mr);
      ctx.lineTo(cx + Math.cos(a) * (mr + 5), cy + Math.sin(a) * (mr + 5));
      ctx.stroke();
    }
  }

  if (flag && !rev) {
    ctx.fillStyle = '#546e7a';
    ctx.fillRect(x + CELL / 2 - 1, y + CELL * 0.3, 2, CELL * 0.45);
    ctx.fillStyle = FLAG_COLOR;
    ctx.beginPath();
    ctx.moveTo(x + CELL / 2 + 1, y + CELL * 0.3);
    ctx.lineTo(x + CELL - 7, y + CELL * 0.45);
    ctx.lineTo(x + CELL / 2 + 1, y + CELL * 0.6);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#ffab91';
    ctx.beginPath();
    ctx.moveTo(x + CELL / 2 + 1, y + CELL * 0.3);
    ctx.lineTo(x + CELL - 9, y + CELL * 0.42);
    ctx.lineTo(x + CELL / 2 + 1, y + CELL * 0.44);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#546e7a';
    ctx.fillRect(x + CELL / 2 - 4, y + CELL * 0.73, 8, 3);
  }
}

function drawPanel() {
  const py = H + 4;

  ctx.fillStyle = '#0f0f1c';
  ctx.fillRect(0, py, W, PANEL_H - 4);
  ctx.strokeStyle = '#1e1e38';
  ctx.lineWidth = 1;
  ctx.strokeRect(0, py, W, PANEL_H - 4);

  // Mine counter
  ctx.fillStyle = '#ff7043';
  ctx.font = 'bold 20px Courier New';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillText('💣 ' + String(Math.max(0, minesLeft)).padStart(3, '0'), 16, py + 26);

  // Timer
  const t = gameState === 'playing' || gameState === 'won' || gameState === 'lost'
    ? String(Math.floor(timer)).padStart(3, '0') : '000';
  ctx.fillStyle = '#4fc3f7';
  ctx.textAlign = 'right';
  ctx.fillText('⏱ ' + t, W - 16, py + 26);

  // Best time
  ctx.fillStyle = '#546e7a';
  ctx.font = '10px Courier New';
  ctx.textAlign = 'center';
  if (bestTime > 0) ctx.fillText('最佳: ' + bestTime + 's', W / 2, py + 44);
  else ctx.fillText('踩地雷 Minesweeper', W / 2, py + 44);

  // Restart hint
  ctx.fillStyle = '#546e7a';
  ctx.font = '10px Courier New';
  ctx.textAlign = 'right';
  ctx.fillText('右鍵標記旗 | R重玩', W - 16, py + 44);
}

// === INPUT ===
canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  if (my < H) {
    const c = Math.floor(mx / CELL);
    const r = Math.floor(my / CELL);
    if (r >= 0 && r < ROWS && c >= 0 && c < COLS) {
      hoverCell[0] = r;
      hoverCell[1] = c;
    } else {
      hoverCell[0] = null;
      hoverCell[1] = null;
    }
  } else {
    hoverCell[0] = null;
    hoverCell[1] = null;
  }
});

canvas.addEventListener('mouseleave', () => {
  hoverCell[0] = null;
  hoverCell[1] = null;
});

canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  if (my >= H) return;
  if (gameState === 'won' || gameState === 'lost') return;

  const c = Math.floor(mx / CELL);
  const r = Math.floor(my / CELL);
  if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return;

  if (!firstClick) {
    firstClick = true;
    gameState = 'playing';
    placeMines(r, c);
  }

  revealCell(r, c);
  checkWin();
});

canvas.addEventListener('contextmenu', (e) => {
  e.preventDefault();
  if (gameState !== 'playing') return;
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  if (my >= H) return;
  const c = Math.floor(mx / CELL);
  const r = Math.floor(my / CELL);
  if (r >= 0 && r < ROWS && c >= 0 && c < COLS) flagCell(r, c);
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'r' || e.key === 'R') initGame();
});

// === GAME LOOP ===
let lastTime = 0;
function loop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.1);
  lastTime = timestamp;

  if (gameState === 'playing') timer += dt;

  requestAnimationFrame(loop);
  draw();
}

initGame();
requestAnimationFrame(loop);
</script>
</body>
</html>
